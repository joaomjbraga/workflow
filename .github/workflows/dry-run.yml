name: Dry-run bootstrap

on:
  push:
  pull_request:

jobs:
  dry-run:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, fedora-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Run install.sh (dry-run)
        run: |
          chmod +x ./install.sh
          ./install.sh --dry-run --yes

  dry-run-arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - uses: actions/checkout@v4
      - name: Prepare container
        run: |
          pacman -Syu --noconfirm bash git curl ca-certificates || true
      - name: Run install.sh (dry-run) on Arch container
        run: |
          chmod +x ./install.sh
          ./install.sh --dry-run --yes
