name: Dry-run bootstrap

on:
  push:
  pull_request:

jobs:
  dry-run:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Use only GitHub-hosted runners here (ubuntu). Fedora is not a hosted label
        # and will remain queued waiting for a runner — run Fedora in a container instead.
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Run install.sh (dry-run)
        run: |
          chmod +x ./install.sh
          ./install.sh --dry-run --yes

  dry-run-arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

  dry-run-fedora:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest

    steps:
      - uses: actions/checkout@v4
      - name: Prepare Fedora container
        run: |
          dnf install -y git curl ca-certificates || true
      - name: Run install.sh (dry-run) on Fedora container
        run: |
          chmod +x ./install.sh
          ./install.sh --dry-run --yes

    steps:
      - uses: actions/checkout@v4
      - name: Prepare container
        run: |
          pacman -Syu --noconfirm bash git curl ca-certificates || true
      - name: Run install.sh (dry-run) on Arch container
        run: |
          chmod +x ./install.sh
          ./install.sh --dry-run --yes
